# Server configuration
server.port=${PORT:8082}
server.address=0.0.0.0

# Database connection (mapped to env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fraud_db_secure?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Increase timeout for slow cloud DB connections
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Email configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ML Service Integration
ML_SERVICE_URL=${ML_SERVICE_URL:http://localhost:8000/predict}

# App Custom Settings
app.auth.allow-signup=true
app.fraud.alert-recipient=fraudalerts123@gmail.com

# Management / Health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
